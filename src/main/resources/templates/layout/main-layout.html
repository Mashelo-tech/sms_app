<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Secure SMS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Global Premium CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- â•â•â• SIDEBAR â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
<div class="sidebar">
    <a href="/" class="sidebar-brand">
        <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
        Secure SMS
    </a>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <!-- Active state could be passed dynamically, but for simplicity we rely on JS or Thymeleaf conditional logic -->
        <a href="/" class="nav-link" th:classappend="${requestURI == '/' ? 'active' : ''}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <div class="nav-section-label">Academics</div>
        <a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#studentModal">
            <i class="bi bi-person-plus"></i> Register Student
        </a>
        <a href="/teachers" class="nav-link" th:classappend="${#strings.startsWith(requestURI != null ? requestURI : '', '/teachers') ? 'active' : ''}">
            <i class="bi bi-briefcase"></i> Manage Teachers
        </a>
        <a href="/results" class="nav-link" sec:authorize="hasAnyRole('TEACHER','DOS','SUPER_DOS','HEADTEACHER')" th:classappend="${#strings.startsWith(requestURI != null ? requestURI : '', '/results') ? 'active' : ''}">
            <i class="bi bi-pencil-square"></i> Enter Results
        </a>
        <a href="/reports" class="nav-link" sec:authorize="hasAnyRole('DOS','SUPER_DOS','HEADTEACHER')" th:classappend="${#strings.startsWith(requestURI != null ? requestURI : '', '/reports') ? 'active' : ''}">
            <i class="bi bi-file-earmark-bar-graph"></i> Reports
        </a>

        <div class="nav-section-label" sec:authorize="hasAnyRole('SUPER_DOS','DOS','HEADTEACHER')">Admin</div>
        <a href="/users" class="nav-link" sec:authorize="hasAnyRole('SUPER_DOS','DOS','HEADTEACHER')" th:classappend="${#strings.startsWith(requestURI != null ? requestURI : '', '/users') ? 'active' : ''}">
            <i class="bi bi-people"></i> System Users
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-pill">
            <div class="d-flex align-items-center gap-2 mb-1">
                <i class="bi bi-person-circle text-white fs-5"></i>
                <span class="text-white fw-semibold small" th:text="${currentUser?.fullName ?: currentUsername}">User</span>
            </div>
            <span class="role-badge" th:text="${currentRole}">ROLE</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                <i class="bi bi-box-arrow-right me-1"></i> Sign Out
            </button>
        </form>
    </div>
</div>

<!-- â•â•â• MAIN CONTENT â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
<div class="main-content">
    <div layout:fragment="content">
        <!-- Page-specific content goes here -->
    </div>
</div>

<!-- â•â•â• STUDENT REGISTRATION MODAL â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
<div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header" style="background:#0f172a; color:#fff;">
                <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>New Student Registration</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/register-student}" method="POST" th:object="${student != null ? student : new com.schoolsystem.sms.model.Student()}">
                <div class="modal-body p-4">

                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-secondary text-uppercase">Registration Number</label>
                        <input type="text" name="registrationNumber" class="form-control" placeholder="e.g. REG-2026-001">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-secondary text-uppercase">Full Name</label>
                        <input type="text" name="fullName" class="form-control" placeholder="">
                    </div>

                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold small text-secondary text-uppercase">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="" disabled selected>Select</option>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold small text-secondary text-uppercase">Class</label>
                            <select name="currentClass" class="form-select">
                                <option value="">Unassigned</option>
                                <option th:each="cl : ${classLevels}" th:value="${cl.id}" th:text="${cl.name}">S1</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-6">
                            <label class="form-label fw-semibold small text-secondary text-uppercase">Date of Birth</label>
                            <input type="date" name="dateOfBirth" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold small text-secondary text-uppercase">Enrollment Date</label>
                            <input type="date" name="enrollmentDate" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-save me-1"></i> Save Student
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
