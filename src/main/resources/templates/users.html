<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure SMS - System Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1); }
        .nav-link { color: #cfd8dc; font-weight: 500; padding: 0.75rem 1rem; margin-bottom: 0.25rem; border-radius: 0.375rem; }
        .nav-link:hover, .nav-link.active { color: #fff; background-color: rgba(255,255,255,0.1); }
        .nav-link i { margin-right: 0.5rem; }
        .card { border: none; border-radius: 0.5rem; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse p-3">
            <a href="/" class="d-flex align-items-center mb-4 text-white text-decoration-none">
                <i class="bi bi-mortarboard-fill fs-3 me-2 text-primary"></i>
                <span class="fs-5 fw-bold">Secure SMS</span>
            </a>
            
            <ul class="nav flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#studentModal">
                        <i class="bi bi-person-plus"></i> Register Student
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/teachers" class="nav-link">
                        <i class="bi bi-briefcase"></i> Manage Teachers
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/users" class="nav-link active">
                        <i class="bi bi-people"></i> System Users
                    </a>
                </li>
            </ul>

            <hr class="text-secondary mt-5">
            
            <form th:action="@{/logout}" method="post" class="w-100">
                <button type="submit" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                    <i class="bi bi-box-arrow-right me-2"></i> Sign Out
                </button>
            </form>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-4 border-bottom">
                <h1 class="h2 text-dark fw-bold">System Users</h1>
                <button class="btn btn-primary">
                    <i class="bi bi-person-plus-fill me-1"></i> Add New User
                </button>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 text-secondary fw-bold"><i class="bi bi-shield-lock me-2"></i>Authorized Personnel</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-secondary">
                                <tr>
                                    <th class="ps-4">Username</th>
                                    <th>Full Name</th>
                                    <th>Email Address</th>
                                    <th>System Role</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td class="ps-4 fw-bold text-dark" th:text="${user.username}">admin</td>
                                    <td th:text="${user.fullName}">System Admin</td>
                                    <td th:text="${user.email}">admin@school.com</td>
                                    <td>
                                        <span class="badge bg-info text-dark" th:text="${user.role}">SUPER_DOS</span>
                                    </td>
                                    <td>
                                        <span class="badge bg-success" th:if="${user.enabled}">Active</span>
                                        <span class="badge bg-danger" th:unless="${user.enabled}">Disabled</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="5" class="text-center text-muted py-5">
                                        No users found in the system.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
