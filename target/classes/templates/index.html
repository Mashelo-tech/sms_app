<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secure SMS - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🏫 Secure School Management System</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active">Dashboard</a>
                    <a href="#" class="list-group-item list-group-item-action">Register Student</a>
                    <a href="#" class="list-group-item list-group-item-action">Register Teacher</a>
                    <a href="#" class="list-group-item list-group-item-action">View Users</a>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">Recent Student Registrations</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Reg Number</th>
                                    <th>Full Name</th>
                                    <th>Gender</th>
                                    <th>Enrollment Date</th>
                                    <th>Current Class</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="student : ${students}">
                                    <td th:text="${student.regNumber}">REG123</td>
                                    <td th:text="${student.fullName}">John Doe</td>
                                    <td th:text="${student.gender}">Male</td>
                                    <td th:text="${student.enrollmentDate}">2026-01-28</td>
                                    <td th:text="${student.currentClass != null ? student.currentClass.name : 'Unassigned'}">Senior 1</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(students)}">
                                    <td colspan="5" class="text-center text-muted">No students registered yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">New Student Registration</h5>
        <button type="anonymous" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/register-student}" method="POST">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="fullName" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Registration Number</label>
            <input type="text" name="regNumber" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-primary">Save Student</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
